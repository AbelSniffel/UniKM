name: unikm
description: "UniKM - Universal Key Manager for managing game activation keys."
publish_to: 'none'
version: 1.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Database
  drift: ^2.31.0
  sqlite3: ^2.9.4
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

  # Encryption (only cryptography is actually used)
  cryptography: ^2.7.0

  # HTTP & API
  http: ^1.2.0
  dio: ^5.7.0

  # Desktop Window Management
  window_manager: ^0.5.1
  
  # UI & Animations
  flutter_animate: ^4.5.2
  visibility_detector: ^0.4.0+2
  # rive: ^0.13.20 #Currently disabled due to missing ClangCL build tools

  shimmer: ^3.0.0
  
  # Image Handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  
  # Storage
  shared_preferences: ^2.3.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Markdown Rendering
  flutter_markdown_plus: ^1.0.7

  # Notifications (OS-level)
  flutter_local_notifications: ^18.0.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  url_launcher: ^6.3.1
  file_picker: ^10.3.10
  collection: ^1.19.0
  vector_math: ^2.1.2
  ffi: ^2.1.4
  package_info_plus: ^9.0.0
  json_annotation: ^4.11.0
  desktop_drop: ^0.7.0
  
  # System Info (for Health Monitor)
  system_info2: ^4.0.0
  
  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0
  font_awesome_flutter: ^10.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.11.1
  drift_dev: ^2.31.0
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0

flutter:
  uses-material-design: true
  
  # TODO: Add custom assets when available
